<style>
  :root {
    --bg: #f4f5f3;
    --surface: #ffffff;
    --border: #dcdfd9;
    --text: #1c1f1b;
    --text-soft: #6b6f66;
    --text-faint: #9a9d94;
    --green: #1d9e75;
    --green-bg: #e1f5ee;
    --green-text: #085041;
    --red: #d23b3b;
    --red-bg: #fce8e8;
    --red-text: #7a1f1f;
    --amber: #c9821a;
    --amber-bg: #fbeed9;
    --amber-text: #6b4408;
    --purple: #7c3aed;
    --purple-bg: #f0e7fe;
    --purple-text: #3b1a7a;
    --blue: #2563eb;
    --radius: 10px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    padding: 0 0 80px;
    min-height: 100vh;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 16px 0;
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 12px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--text);
    color: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
  }
  .brand-text h1 {
    font-size: 16px;
    font-weight: 600;
    margin: 0;
    line-height: 1.2;
  }
  .brand-text p {
    font-size: 12px;
    color: var(--text-soft);
    margin: 0;
  }
  .refresh-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-soft);
  }
  .refresh-btn:active { transform: scale(0.94); }
  .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .summary-bar {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    padding-bottom: 12px;
  }
  .metric {
    background: var(--bg);
    border-radius: var(--radius);
    padding: 8px 6px;
    text-align: center;
  }
  .metric-val { font-size: 18px; font-weight: 700; line-height: 1.1; }
  .metric-lbl { font-size: 10px; color: var(--text-soft); margin-top: 2px; font-weight: 500; }

  .tabs {
    display: flex;

  }
  .tab {

  main {
    padding: 16px;

    margin: 0 auto;
  }

  .panel { display: none; }
  .panel.active { display: block; }

  /* Add stop form */
  .form-card {

  }

  .field input, .field textarea {

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn {

  .btn:active { transform: scale(0.97); }

  }
  .btn-outline {

  .btn-green { color: var(--green-text); border-color: var(--green); background: var(--green-bg); }
  .btn-red { color: var(--red-text); border-color: var(--red); background: var(--red-bg); }
  .btn-ghost {

  }
  .btn-sm { font-size: 12.5px; padding: 9px 12px; flex: 1; }

  /* Stop list */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;

  .stops-list { display: flex; flex-direction: column; gap: 10px; }
  .stop-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    border-left: 4px solid var(--text-faint);
  }
  .stop-card.delivered { border-left-color: var(--green); }
  .stop-card.not-delivered { border-left-color: var(--red); }
  .stop-card.pending { border-left-color: var(--amber); }
  .stop-card.missing { border-left-color: var(--purple); }

  .stop-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;

  }
  .stop-num {

    font-weight: 700;

  }
  .stop-name { font-size: 20px; font-weight: 700; margin: 1px 0 4px; }
  .stop-meta { font-size: 12.5px; color: var(--text-soft); line-height: 1.5; }
  .stop-notes { font-size: 12.5px; color: var(--text-soft); margin-top: 6px; font-style: italic; }

  .badge {
    font-size: 11px;

  .badge-pending { background: var(--amber-bg); color: var(--amber-text); }

  .action-row { display: flex; gap: 8px; margin-top: 12px; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

  select.reason-select {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    background: var(--bg);

  .warn-text { font-size: 12px; color: var(--red); margin-top: 6px; font-weight: 500; }
  .ok-text { font-size: 12px; color: var(--text-soft); margin-top: 6px; }

  .pay-label { font-size: 11px; font-weight: 700; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 8px; }
  .pay-status-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  .pay-input-row { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .pay-input-row input {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    background: var(--bg);

  .empty-state {
    text-align: center;

  .empty-state svg { color: var(--text-faint); margin-bottom: 10px; }
  .empty-state p { font-size: 14px; margin: 0; }

  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--text);
    color: var(--bg);
    padding: 10px 18px;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;

    white-space: nowrap;

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .date-nav {

    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
    margin-bottom: 16px;
  }
  .date-nav button {
    background: none;
    border: none;
    color: var(--text-soft);
    padding: 4px 8px;
    cursor: pointer;
    display: flex;
  }
  .date-nav .date-label { font-size: 13.5px; font-weight: 600; }

  .filter-row {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    overflow-x: auto;
    padding-bottom: 2px;
  }
  .filter-chip {
    flex-shrink: 0;
    font-size: 12.5px;
    font-weight: 600;
    padding: 7px 13px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-soft);
    cursor: pointer;
  }
  .filter-chip.active {
    background: var(--text);
    border-color: var(--text);
    color: var(--surface);
  }

  .loading-row {
    text-align: center;
    padding: 30px;
    color: var(--text-faint);
    font-size: 13px;
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="brand">
      <div class="brand-mark">S</div>
      <div class="brand-text">
        <h1>SDI Delivery Tracker</h1>
        <p id="header-sub">Loading...</p>
      </div>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="manualRefresh()" aria-label="Refresh">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
    </button>
  </div>

  <div class="summary-bar">
    <div class="metric"><div class="metric-val" id="m-total">0</div><div class="metric-lbl">Stops</div></div>
    <div class="metric"><div class="metric-val" id="m-delivered" style="color:var(--green)">0</div><div class="metric-lbl">Delivered</div></div>
    <div class="metric"><div class="metric-val" id="m-failed" style="color:var(--red)">0</div><div class="metric-lbl">Missed</div></div>
    <div class="metric"><div class="metric-val" id="m-unpaid" style="color:var(--red)">0</div><div class="metric-lbl">Unpaid</div></div>
    <div class="metric"><div class="metric-val" id="m-missing" style="color:var(--purple)">0</div><div class="metric-lbl">Missing</div></div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="route" onclick="switchTab('route')">Today's route</div>
    <div class="tab" data-tab="add" onclick="switchTab('add')">Add stop</div>
  </div>
</header>

<main>

  <div class="panel active" id="panel-route">
    <div class="date-nav">
      <button onclick="changeDate(-1)" aria-label="Previous day">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
      <span class="date-label" id="date-label">Today</span>
      <button onclick="changeDate(1)" aria-label="Next day">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </button>
    </div>

    <div class="filter-row">
      <div class="filter-chip active" data-filter="all" onclick="setFilter('all')">All</div>
      <div class="filter-chip" data-filter="pending" onclick="setFilter('pending')">Pending</div>
      <div class="filter-chip" data-filter="delivered" onclick="setFilter('delivered')">Delivered</div>
      <div class="filter-chip" data-filter="not-delivered" onclick="setFilter('not-delivered')">Not delivered</div>
      <div class="filter-chip" data-filter="unpaid" onclick="setFilter('unpaid')">Unpaid</div>
      <div class="filter-chip" data-filter="missing" onclick="setFilter('missing')">Missing</div>
    </div>

    <div id="stops-container">
      <div class="loading-row">Loading stops...</div>
    </div>
  </div>

  <div class="panel" id="panel-add">
    <div class="form-card">
      <div class="field">
        <label>Customer or business name</label>
        <input type="text" id="inp-name" placeholder="e.g. Ahmed Store" autocomplete="off">
      </div>
      <div class="field">
        <label>Address <span class="optional">(optional)</span></label>
        <input type="text" id="inp-addr" placeholder="e.g. 1234 Canal St" autocomplete="off">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Order # <span class="optional">(optional)</span></label>
          <input type="text" id="inp-order" placeholder="#1042" autocomplete="off">
        </div>
        <div class="field">
          <label>Notes <span class="optional">(optional)</span></label>
          <input type="text" id="inp-notes" placeholder="Call on arrival" autocomplete="off">
        </div>
      </div>
      <button class="btn btn-primary" id="add-btn" onclick="submitStop()">Add stop to today's route</button>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxiqnlZeH7BLBFFsor5rIhjjEkhFmDGsKVxS6KWQuVFska6joEP31rdJMsk3C-BuUr-3Q/exec';

const REASONS = [
  "Customer not home / no one answered",
  "Business was closed",
  "Wrong address / couldn't find location",
  "Customer refused delivery",
  "Item damaged, did not deliver",
  "No parking / couldn't access building",
  "Customer asked to reschedule",
  "Driver ran out of time",
  "Other"
];

let stops = [];
let allStops = [];
let currentFilter = 'all';
let dateOffset = 0;
let pollTimer = null;
let lastActionTime = 0;
const ACTION_COOLDOWN = 8000; // skip auto-refresh for 8 seconds after any action

function fmtDate(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function dateLabel(offset) {
  if (offset === 0) return 'Today';
  if (offset === -1) return 'Yesterday';
  if (offset === 1) return 'Tomorrow';
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

function changeDate(delta) {
  dateOffset += delta;
  document.getElementById('date-label').textContent = dateLabel(dateOffset);
  loadStops();
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('panel-route').classList.toggle('active', tab === 'route');
  document.getElementById('panel-add').classList.toggle('active', tab === 'add');
  if (tab === 'add') {
    setTimeout(() => document.getElementById('inp-name').focus(), 100);
  }
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.filter === f));
  renderStops();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

async function apiGet(params) {
  const url = API_URL + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url);
  return res.json();
}

async function apiPost(body) {
  const res = await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify(body)
  });
  return res.json();
}

function parseSheetDate(val) {
  // Handle various date formats Sheets might return
  if (!val) return '';
  const str = String(val);
  // Already yyyy-MM-dd
  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
  // Full date string like "Fri Jun 19 2026 00:00:00 GMT-0500..."
  const d = new Date(str);
  if (!isNaN(d.getTime())) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }
  return str;
}

function isMissing(stop) {
  if (stop.Status !== 'pending') return false;
  const dateStr = parseSheetDate(stop.Date);
  const timeStr = stop.AddedTime || '';
  // Build a Date from the stop's date
  const stopDate = new Date(dateStr + 'T12:00:00');
  if (isNaN(stopDate.getTime())) return false;
  const now = new Date();
  const hoursDiff = (now - stopDate) / (1000 * 60 * 60);
  return hoursDiff >= 48;
}

async function loadStops(silent) {
  // Skip auto-refresh if a manual action just happened
  if (silent && (Date.now() - lastActionTime) < ACTION_COOLDOWN) return;
  const refreshBtn = document.getElementById('refresh-btn');
  if (!silent) refreshBtn.classList.add('spinning');
  try {
    const dateStr = fmtDate(dateOffset);
    const data = await apiGet({ action: 'list' });
    allStops = data.stops || [];
    // Filter by date on the client side
    stops = allStops.filter(s => parseSheetDate(s.Date) === dateStr);
    renderStops();
    document.getElementById('header-sub').textContent = stops.length + ' stop' + (stops.length === 1 ? '' : 's') + ' · ' + dateLabel(dateOffset).toLowerCase();
  } catch (err) {
    document.getElementById('header-sub').textContent = 'Connection issue — retrying';
  }
  if (!silent) refreshBtn.classList.remove('spinning');
}

function manualRefresh() {
  loadStops(false);
}

async function submitStop() {
  const name = document.getElementById('inp-name').value.trim();
  if (!name) {
    document.getElementById('inp-name').focus();
    return;
  }
  const btn = document.getElementById('add-btn');
  btn.disabled = true;
  btn.textContent = 'Adding...';

  try {
    lastActionTime = Date.now();
    await apiPost({
      action: 'add',
      name,
      address: document.getElementById('inp-addr').value.trim(),
      orderNumber: document.getElementById('inp-order').value.trim(),
      notes: document.getElementById('inp-notes').value.trim()
    });
    ['inp-name', 'inp-addr', 'inp-order', 'inp-notes'].forEach(id => document.getElementById(id).value = '');
    showToast('Stop added');
    dateOffset = 0;
    document.getElementById('date-label').textContent = dateLabel(0);
    await loadStops(true);
    switchTab('route');
  } catch (err) {
    showToast('Could not add stop — check connection');
  }
  btn.disabled = false;
  btn.textContent = 'Add stop to today\'s route';
}

async function updateField(id, fields) {
  lastActionTime = Date.now();
  // optimistic local update
  const s = stops.find(x => x.ID === id);
  if (s) Object.assign(s, fields);
  renderStops();
  try {
    await apiPost({ action: 'update', id, fields });
  } catch (err) {
    showToast('Sync issue — will retry');
  }
}

function markDelivered(id) {
  updateField(id, { Status: 'delivered', Reason: '' });
}
function markFailed(id) {
  updateField(id, { Status: 'not-delivered' });
}
function setReason(id, val) {
  updateField(id, { Reason: val });
}
function markPaid(id, method) {
  if (method === 'check' || method === 'money order') {
    // Show the check/MO number input instead of saving immediately
    pendingPayId = id;
    pendingPayMethod = method;
    renderStops();
    setTimeout(() => {
      const inp = document.getElementById('paynum-' + id);
      if (inp) inp.focus();
    }, 50);
    return;
  }
  updateField(id, { Payment: 'paid', PayMethod: method, ReceivedBy: '' });
}

let pendingPayId = null;
let pendingPayMethod = '';

function confirmPayNumber(id) {
  const inp = document.getElementById('paynum-' + id);
  const num = inp ? inp.value.trim() : '';
  const label = pendingPayMethod + (num ? ' #' + num : '');
  pendingPayId = null;
  pendingPayMethod = '';
  updateField(id, { Payment: 'paid', PayMethod: label, ReceivedBy: '' });
}

function cancelPayNumber() {
  pendingPayId = null;
  pendingPayMethod = '';
  renderStops();
}
function markUnpaid(id) {
  updateField(id, { Payment: 'unpaid', PayMethod: '' });
}
function resetPayment(id) {
  pendingPayId = null;
  pendingPayMethod = '';
  updateField(id, { Payment: '', PayMethod: '', ReceivedBy: '' });
}

let receivedByTimers = {};
function setReceivedByLive(id, val) {
  lastActionTime = Date.now();
  const s = stops.find(x => x.ID === id);
  if (s) s.ReceivedBy = val;
  clearTimeout(receivedByTimers[id]);
  receivedByTimers[id] = setTimeout(() => {
    apiPost({ action: 'update', id, fields: { ReceivedBy: val } }).catch(() => {});
  }, 600);
  renderReceivedHint(id, val);
}

function renderReceivedHint(id, val) {
  const hint = document.getElementById('hint-' + id);
  if (!hint) return;
  if (val && val.trim()) {
    hint.className = 'ok-text';
    hint.innerHTML = 'Received by: ' + val;
  } else {
    hint.className = 'warn-text';
    hint.textContent = 'Required — enter who received the order';
  }
}

function applyFilter(list) {
  if (currentFilter === 'all') return list;
  if (currentFilter === 'unpaid') return list.filter(s => s.Payment === 'unpaid');
  if (currentFilter === 'missing') return allStops.filter(s => isMissing(s));
  return list.filter(s => s.Status === currentFilter);
}

function renderStops() {
  const total = stops.length;
  const delivered = stops.filter(s => s.Status === 'delivered').length;
  const failed = stops.filter(s => s.Status === 'not-delivered').length;
  const unpaid = stops.filter(s => s.Payment === 'unpaid').length;
  const missing = allStops.filter(s => isMissing(s)).length;
  document.getElementById('m-total').textContent = total;
  document.getElementById('m-delivered').textContent = delivered;
  document.getElementById('m-failed').textContent = failed;
  document.getElementById('m-unpaid').textContent = unpaid;
  document.getElementById('m-missing').textContent = missing;

  const container = document.getElementById('stops-container');
  const filtered = applyFilter(stops);

  if (stops.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9 12l2 2 4-4"></path></svg>
      <p>No stops for this day yet.<br>Add one from the "Add stop" tab.</p>
    </div>`;
    return;
  }

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><p>No stops match this filter.</p></div>`;
    return;
  }

  container.innerHTML = filtered.map((s) => {
    const idx = stops.indexOf(s) + 1;
    const stopMissing = isMissing(s);
    const badgeCls = s.Status === 'delivered' ? 'badge-delivered' : s.Status === 'not-delivered' ? 'badge-failed' : stopMissing ? 'badge-missing' : 'badge-pending';
    const badgeTxt = s.Status === 'delivered' ? 'Delivered' : s.Status === 'not-delivered' ? 'Not delivered' : stopMissing ? 'MISSING' : 'Pending';
    const cardClass = s.Status === 'delivered' ? 'delivered' : s.Status === 'not-delivered' ? 'not-delivered' : stopMissing ? 'missing' : 'pending';

    const metaBits = [];
    if (currentFilter === 'missing') metaBits.push(parseSheetDate(s.Date));
    if (s.OrderNumber) metaBits.push(s.OrderNumber);
    if (s.Address) metaBits.push(s.Address);
    metaBits.push('Added ' + parseSheetTime(s.AddedTime || ''));

    const notesHtml = s.Notes ? `<div class="stop-notes">${escapeHtml(s.Notes)}</div>` : '';
    let overdueHtml = '';
    if (stopMissing) {
      const stopDate = new Date(parseSheetDate(s.Date) + 'T12:00:00');
      const hoursDiff = Math.floor((new Date() - stopDate) / (1000 * 60 * 60));
      const days = Math.floor(hoursDiff / 24);
      overdueHtml = `<div style="font-size:12px;color:var(--purple);font-weight:600;margin-top:6px">⚠ Overdue by ${days} day${days !== 1 ? 's' : ''} — not fulfilled within 48 hours</div>`;
    }

    let reasonHtml = '';
    if (s.Status === 'not-delivered') {
      reasonHtml = `<select class="reason-select" onchange="setReason('${s.ID}', this.value)">
        <option value="">Select reason for non-delivery</option>
        ${REASONS.map(r => `<option value="${escapeHtml(r)}" ${s.Reason === r ? 'selected' : ''}>${escapeHtml(r)}</option>`).join('')}
      </select>
      ${s.Reason ? `<div class="ok-text">${escapeHtml(s.Reason)}</div>` : `<div class="warn-text">Reason needed</div>`}`;
    }

    let actionHtml = '';
    if (s.Status === 'pending') {
      actionHtml = `<div class="action-row">
        <button class="btn btn-sm btn-green" onclick="markDelivered('${s.ID}')">Delivered</button>
        <button class="btn btn-sm btn-red" onclick="markFailed('${s.ID}')">Not delivered</button>
      </div>`;
    } else if (s.Status === 'not-delivered') {
      actionHtml = `<div class="action-row"><button class="btn-ghost" onclick="markDelivered('${s.ID}')">Undo — mark delivered instead</button></div>`;
    }

    let payHtml = '';
    if (s.Status === 'delivered') {
      if (!s.Payment) {
        if (pendingPayId === s.ID) {
          // Show check/MO number input
          payHtml = `<hr class="divider">
            <div class="pay-label">Enter ${escapeHtml(pendingPayMethod)} number</div>
            <div class="pay-input-row">
              <input type="text" id="paynum-${s.ID}" placeholder="${escapeHtml(pendingPayMethod)} number (optional)" onkeydown="if(event.key==='Enter')confirmPayNumber('${s.ID}')">
              <div class="action-row">
                <button class="btn btn-sm btn-green" onclick="confirmPayNumber('${s.ID}')">Save</button>
                <button class="btn btn-sm btn-outline" onclick="cancelPayNumber()">Cancel</button>
              </div>
            </div>`;
        } else {
          payHtml = `<hr class="divider">
            <div class="pay-label">Payment</div>
            <div class="action-row">
              <button class="btn btn-sm btn-green" onclick="markPaid('${s.ID}','cash')">Cash</button>
              <button class="btn btn-sm btn-green" onclick="markPaid('${s.ID}','check')">Check</button>
              <button class="btn btn-sm btn-green" onclick="markPaid('${s.ID}','money order')">Money order</button>
            </div>
            <div class="action-row" style="margin-top:6px">
              <button class="btn btn-sm btn-red" onclick="markUnpaid('${s.ID}')">Not paid</button>
            </div>`;
        }
      } else if (s.Payment === 'paid') {
        payHtml = `<hr class="divider">
          <div class="pay-status-row">
            <span class="badge badge-delivered">Paid — ${escapeHtml(s.PayMethod || '')}${s.PayTime ? ' · ' + parseSheetTime(s.PayTime) : ''}</span>
            <button class="btn-ghost" onclick="resetPayment('${s.ID}')">Change</button>
          </div>`;
      } else if (s.Payment === 'unpaid') {
        payHtml = `<hr class="divider">
          <div class="pay-status-row">
            <span class="badge badge-failed">Not paid${s.PayTime ? ' · ' + parseSheetTime(s.PayTime) : ''}</span>
            <button class="btn-ghost" onclick="resetPayment('${s.ID}')">Change</button>
          </div>
          <div class="pay-input-row">
            <input type="text" placeholder="Name of person who received order" value="${escapeAttr(s.ReceivedBy || '')}" oninput="setReceivedByLive('${s.ID}', this.value)">
            <div id="hint-${s.ID}" class="${s.ReceivedBy ? 'ok-text' : 'warn-text'}">${s.ReceivedBy ? 'Received by: ' + escapeHtml(s.ReceivedBy) : 'Required — enter who received the order'}</div>
          </div>`;
      }
    }

    return `<div class="stop-card ${cardClass}">
      <div class="stop-top">
        <div>
          <div class="stop-num">#${idx}</div>
          <div class="stop-name">${escapeHtml(s.Name)}</div>
          <div class="stop-meta">${metaBits.map(escapeHtml).join(' · ')}</div>
        </div>
        <span class="badge ${badgeCls}">${badgeTxt}</span>
      </div>
      ${notesHtml}
      ${overdueHtml}
      ${actionHtml}
      ${reasonHtml}
      ${payHtml}
    </div>`;
  }).join('');
}

function parseSheetTime(val) {
  if (!val) return '';
  const str = String(val);
  // Already a simple time like "5:24 PM"
  if (/^\d{1,2}:\d{2}\s?(AM|PM)$/i.test(str)) return str;
  // ISO date string with time (Sheets stores time-only as 1899-12-30T...)
  const d = new Date(str);
  if (!isNaN(d.getTime())) {
    let h = d.getHours();
    const m = String(d.getMinutes()).padStart(2, '0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return `${h}:${m} ${ampm}`;
  }
  return str;
}

function escapeHtml(str) {
  if (str === undefined || str === null) return '';
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(str) {
  return escapeHtml(str).replace(/`/g, '&#96;');
}

document.getElementById('date-label').textContent = dateLabel(0);
loadStops();
pollTimer = setInterval(() => loadStops(true), 15000);
</script>
