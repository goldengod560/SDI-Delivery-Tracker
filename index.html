<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>SDI Delivery Tracker</title>
<!-- Clean SVG favicon — works everywhere, no broken base64 -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231c1f1b'/%3E%3Ctext x='50' y='65' font-family='system-ui' font-size='55' font-weight='700' text-anchor='middle' fill='%23f4f5f3'%3ES%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='36' fill='%231c1f1b'/%3E%3Ctext x='90' y='118' font-family='system-ui' font-size='100' font-weight='700' text-anchor='middle' fill='%23f4f5f3'%3ES%3C/text%3E%3C/svg%3E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SDI Tracker">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f5f3;
    --surface: #ffffff;
    --border: #dcdfd9;
    --text: #1c1f1b;
    --text-soft: #6b6f66;
    --text-faint: #9a9d94;
    --green: #1d9e75;
    --green-bg: #e1f5ee;
    --green-text: #085041;
    --red: #d23b3b;
    --red-bg: #fce8e8;
    --red-text: #7a1f1f;
    --amber: #c9821a;
    --amber-bg: #fbeed9;
    --amber-text: #6b4408;
    --purple: #7c3aed;
    --purple-bg: #f0e7fe;
    --purple-text: #3b1a7a;
    --blue: #2563eb;
    --radius: 10px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }
  body {
    padding: 0 0 100px;
    min-height: 100vh;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 16px 0;
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 12px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--text);
    color: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
  }
  .brand-text h1 {
    font-size: 16px;
    font-weight: 600;
    margin: 0;
    line-height: 1.2;
  }
  .brand-text p {
    font-size: 12px;
    color: var(--text-soft);
    margin: 0;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .refresh-btn, .report-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-soft);
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
  }
  .refresh-btn:active, .report-btn:active { transform: scale(0.94); }
  .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .summary-bar {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    padding-bottom: 12px;
  }
  @media (max-width: 380px) {
    .summary-bar { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .summary-bar .metric:nth-child(4),
    .summary-bar .metric:nth-child(5) { grid-column: span 1; }
  }
  .metric {
    background: var(--bg);
    border-radius: var(--radius);
    padding: 8px 4px;
    text-align: center;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
  }
  .metric:active { transform: scale(0.96); }
  .metric.highlight-red {
    background: var(--red-bg);
    border: 1.5px solid var(--red);
  }
  .metric.highlight-blue {
    background: #dbeafe;
    border: 1.5px solid var(--blue);
  }
  .metric.active-metric {
    outline: 2px solid var(--text);
    outline-offset: 2px;
  }
  .metric-val { font-size: 18px; font-weight: 700; line-height: 1.1; }
  .metric-lbl { font-size: 10px; color: var(--text-soft); margin-top: 2px; font-weight: 500; }

  .global-banner {
    display: none;
    background: var(--text);
    color: var(--surface);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 99px;
    text-align: center;
    margin: 0 16px 12px;
  }
  .global-banner.show { display: block; }

  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: none;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 10px 0 12px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-soft);
    border-bottom: 2px solid transparent;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
  }
  .tab.active {
    color: var(--text);
    border-bottom-color: var(--text);
  }

  main {
    padding: 16px;
    max-width: 560px;
    margin: 0 auto;
  }

  .panel { display: none; }
  .panel.active { display: block; }

  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    margin-bottom: 20px;
  }
  .field { margin-bottom: 12px; }
  .field:last-of-type { margin-bottom: 0; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-soft);
    margin-bottom: 5px;
  }
  .field .optional { font-weight: 400; color: var(--text-faint); }
  .field input, .field textarea, .field select {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 11px 12px;
    font-size: 15px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    -webkit-appearance: none;
    appearance: none;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none;
    border-color: var(--text);
    background: var(--surface);
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn {
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    padding: 12px 16px;
    cursor: pointer;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
  }
  .btn:disabled { opacity: 0.55; cursor: not-allowed; }
  .btn:active:not(:disabled) { transform: scale(0.97); }
  .btn-primary {
    background: var(--text);
    color: var(--surface);
    width: 100%;
    padding: 13px 16px;
    font-size: 15px;
    margin-top: 4px;
  }
  .btn-outline {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-green { color: var(--green-text); border-color: var(--green); background: var(--green-bg); }
  .btn-red { color: var(--red-text); border-color: var(--red); background: var(--red-bg); }
  .btn-ghost {
    background: none;
    border: none;
    color: var(--text-soft);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 4px;
  }
  .btn-sm { font-size: 12.5px; padding: 10px 12px; flex: 1; }
  @media (max-width: 380px) {
    .btn-sm { font-size: 12px; padding: 11px 8px; }
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-faint);
    margin: 4px 0 10px;
  }
  .stops-list { display: flex; flex-direction: column; gap: 10px; }
  .stop-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    border-left: 4px solid var(--text-faint);
    transition: transform 0.05s;
  }
  .stop-card.delivered { border-left-color: var(--green); }
  .stop-card.not-delivered { border-left-color: var(--red); }
  .stop-card.pending { border-left-color: var(--amber); }
  .stop-card.missing { border-left-color: var(--purple); }

  .stop-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }
  .stop-num { font-size: 11px; font-weight: 700; color: var(--text-faint); }
  .stop-name { font-size: 20px; font-weight: 700; margin: 1px 0 4px; }
  .stop-meta { font-size: 12.5px; color: var(--text-soft); line-height: 1.5; }
  .stop-notes { font-size: 12.5px; color: var(--text-soft); margin-top: 6px; font-style: italic; }

  .badge {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 9px;
    border-radius: 99px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-pending { background: var(--amber-bg); color: var(--amber-text); }
  .badge-delivered { background: var(--green-bg); color: var(--green-text); }
  .badge-failed { background: var(--red-bg); color: var(--red-text); }
  .badge-missing { background: var(--purple-bg); color: var(--purple-text); }

  .action-row { display: flex; gap: 8px; margin-top: 12px; }
  .action-row-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

  select.reason-select {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    margin-top: 8px;
  }
  .warn-text { font-size: 12px; color: var(--red); margin-top: 6px; font-weight: 500; }
  .ok-text { font-size: 12px; color: var(--text-soft); margin-top: 6px; }

  .pay-label { font-size: 11px; font-weight: 700; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 8px; }
  .pay-status-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  .pay-input-row { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .pay-input-row input {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
  }

  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--text-soft);
  }
  .empty-state svg { color: var(--text-faint); margin-bottom: 10px; }
  .empty-state p { font-size: 14px; margin: 0; }

  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--text);
    color: var(--bg);
    padding: 10px 18px;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 50;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .date-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
    margin-bottom: 16px;
  }
  .date-nav button {
    background: none;
    border: none;
    color: var(--text-soft);
    padding: 6px 8px;
    cursor: pointer;
    display: flex;
    touch-action: manipulation;
    border-radius: 6px;
  }
  .date-nav button:active { background: var(--bg); }
  .date-nav .date-label { font-size: 13.5px; font-weight: 600; }

  .filter-row {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    overflow-x: auto;
    padding-bottom: 2px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0;
    font-size: 12.5px;
    font-weight: 600;
    padding: 7px 13px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-soft);
    cursor: pointer;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
  }
  .filter-chip:active { transform: scale(0.96); }
  .filter-chip.active {
    background: var(--text);
    border-color: var(--text);
    color: var(--surface);
  }

  .loading-row { text-align: center; padding: 30px; color: var(--text-faint); font-size: 13px; }

  /* Modal / confirm dialog */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 60;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 20px;
    width: 100%;
    max-width: 320px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
  }
  .modal-card h3 { margin: 0 0 8px; font-size: 16px; }
  .modal-card p { margin: 0 0 16px; font-size: 13px; color: var(--text-soft); line-height: 1.5; }
  .modal-actions { display: flex; gap: 8px; }
  .modal-actions .btn { flex: 1; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="brand">
      <div class="brand-mark">S</div>
      <div class="brand-text">
        <h1>SDI Delivery Tracker</h1>
        <p id="header-sub">Loading...</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="report-btn" id="report-btn" onclick="sendWeeklyReport()" aria-label="Send weekly report" title="Send weekly report">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
      </button>
      <button class="refresh-btn" id="refresh-btn" onclick="manualRefresh()" aria-label="Refresh">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
      </button>
    </div>
  </div>

  <div class="summary-bar">
    <div class="metric" id="metric-total" onclick="showGlobal('all')"><div class="metric-val" id="m-total">0</div><div class="metric-lbl">Stops</div></div>
    <div class="metric" id="metric-delivered" onclick="showGlobal('delivered')"><div class="metric-val" id="m-delivered" style="color:var(--green)">0</div><div class="metric-lbl">Delivered</div></div>
    <div class="metric" id="metric-paid" onclick="showGlobal('paid')"><div class="metric-val" id="m-paid" style="color:var(--green)">0</div><div class="metric-lbl">Paid</div></div>
    <div class="metric highlight-red" id="metric-unpaid" onclick="showGlobal('unpaid')"><div class="metric-val" id="m-unpaid" style="color:var(--red)">0</div><div class="metric-lbl">Unpaid</div></div>
    <div class="metric highlight-blue" id="metric-missing" onclick="showGlobal('missing')"><div class="metric-val" id="m-missing" style="color:var(--purple)">0</div><div class="metric-lbl">Missing</div></div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="route" onclick="switchTab('route')">Today's route</div>
    <div class="tab" data-tab="add" onclick="switchTab('add')">Add stop</div>
  </div>
</header>

<main>

  <div class="panel active" id="panel-route">
    <div class="global-banner" id="global-banner">🌍 Showing all dates — click a date or filter to narrow</div>
    <div class="date-nav">
      <button onclick="changeDate(-1)" aria-label="Previous day">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
      <span class="date-label" id="date-label">Today</span>
      <button onclick="changeDate(1)" aria-label="Next day">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </button>
    </div>

    <div class="filter-row">
      <div class="filter-chip active" data-filter="all">All</div>
      <div class="filter-chip" data-filter="pending">Pending</div>
      <div class="filter-chip" data-filter="delivered">Delivered</div>
      <div class="filter-chip" data-filter="not-delivered">Not delivered</div>
      <div class="filter-chip" data-filter="paid">Paid</div>
      <div class="filter-chip" data-filter="unpaid">Unpaid</div>
      <div class="filter-chip" data-filter="missing">Missing</div>
    </div>

    <div id="stops-container">
      <div class="loading-row">Loading stops...</div>
    </div>

    <div id="copy-route-section" style="display:none; margin-top:16px;">
      <button class="btn btn-outline" style="width:100%" onclick="showCopyModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        Copy this route to another date
      </button>
    </div>

    <div id="copy-modal" style="display:none; margin-top:12px;">
      <div class="form-card">
        <div class="section-label">Copy route to...</div>
        <div class="field">
          <label>Target date</label>
          <input type="date" id="copy-target-date" autocomplete="off">
        </div>
        <div class="action-row">
          <button class="btn btn-sm btn-green" onclick="executeCopyRoute()">Copy stops</button>
          <button class="btn btn-sm btn-outline" onclick="hideCopyModal()">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-add">
    <div class="form-card">
      <div class="field">
        <label>Schedule for date</label>
        <input type="date" id="inp-date" autocomplete="off">
      </div>
      <div class="field">
        <label>Customer or business name</label>
        <input type="text" id="inp-name" placeholder="e.g. Ahmed Store" autocomplete="off">
      </div>
      <div class="field">
        <label>Delivery person <span class="optional">(optional)</span></label>
        <input type="text" id="inp-addr" placeholder="e.g. John" autocomplete="off">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Order # <span class="optional">(optional)</span></label>
          <input type="text" id="inp-order" placeholder="#1042" autocomplete="off">
        </div>
        <div class="field">
          <label>Notes <span class="optional">(optional)</span></label>
          <input type="text" id="inp-notes" placeholder="Call on arrival" autocomplete="off">
        </div>
      </div>
      <button class="btn btn-primary" id="add-btn" onclick="submitStop()">Add stop</button>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<!-- Confirm modal -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal-card">
    <h3 id="confirm-title">Confirm</h3>
    <p id="confirm-body">Are you sure?</p>
    <div class="modal-actions">
      <button class="btn btn-red" id="confirm-yes">Yes</button>
      <button class="btn btn-outline" id="confirm-no">Cancel</button>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxiqnlZeH7BLBFFsor5rIhjjEkhFmDGsKVxS6KWQuVFska6joEP31rdJMsk3C-BuUr-3Q/exec';

const REASONS = [
  "Customer not home / no one answered",
  "Business was closed",
  "Wrong address / couldn't find location",
  "Customer refused delivery",
  "Item damaged, did not deliver",
  "No parking / couldn't access building",
  "Customer asked to reschedule",
  "Driver ran out of time",
  "Other"
];

let stops = [];
let allStops = [];
let currentFilter = 'all';
let dateOffset = 0;
let pollTimer = null;
let lastActionTime = 0;
let isInteracting = false;
let interactionTimer = null;
let pendingPayId = null;
let pendingPayMethod = '';
let pendingChangeId = null;
let receivedByTimers = {};
let globalMode = false;
let renderRaf = null;
let lastStopsHash = '';
let lastAllStopsHash = '';
const ACTION_COOLDOWN = 8000;

function hashStops(arr) {
  // Fast hash: just count + first 3 IDs + last ID. Good enough for change detection.
  if (!arr.length) return '0';
  const ids = arr.map(s => s.ID || '').join(',');
  return arr.length + ':' + ids.slice(0, 200) + ':' + ids.slice(-100);
}

function fmtDate(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function dateLabel(offset) {
  if (offset === 0) return 'Today';
  if (offset === -1) return 'Yesterday';
  if (offset === 1) return 'Tomorrow';
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

function changeDate(delta) {
  dateOffset += delta;
  document.getElementById('date-label').textContent = dateLabel(dateOffset);
  if (globalMode) { globalMode = false; }
  loadStops();
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('panel-route').classList.toggle('active', tab === 'route');
  document.getElementById('panel-add').classList.toggle('active', tab === 'add');
  if (tab === 'add') {
    document.getElementById('inp-date').value = fmtDate(dateOffset);
    setTimeout(() => document.getElementById('inp-name').focus(), 100);
  }
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.filter === f));
  if (globalMode && f !== 'all') { globalMode = false; }
  renderStops();
}

function showGlobal(filter) {
  globalMode = true;
  currentFilter = filter;
  // Highlight active metric
  document.querySelectorAll('.metric').forEach(m => m.classList.remove('active-metric'));
  const map = { 'all': 'metric-total', 'delivered': 'metric-delivered', 'paid': 'metric-paid', 'unpaid': 'metric-unpaid', 'missing': 'metric-missing' };
  const id = map[filter];
  if (id) document.getElementById(id).classList.add('active-metric');
  // Sync filter chips
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.filter === filter));
  renderStops();
  showToast('Showing all dates');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

async function apiGet(params) {
  const url = API_URL + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url);
  return res.json();
}

async function apiPost(body) {
  const res = await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify(body)
  });
  return res.json();
}

function parseSheetDate(val) {
  if (!val) return '';
  const str = String(val);
  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
  const d = new Date(str);
  if (!isNaN(d.getTime())) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }
  return str;
}

function isMissing(stop) {
  if (stop.Status !== 'pending') return false;
  const dateStr = parseSheetDate(stop.Date);
  const stopDate = new Date(dateStr + 'T12:00:00');
  if (isNaN(stopDate.getTime())) return false;
  const now = new Date();
  const hoursDiff = (now - stopDate) / (1000 * 60 * 60);
  return hoursDiff >= 48;
}

async function loadStops(silent) {
  if (silent && (Date.now() - lastActionTime) < ACTION_COOLDOWN) return;
  if (isInteracting) return;
  if (document.hidden) return;
  if (document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA' || document.activeElement.tagName === 'SELECT')) return;

  const refreshBtn = document.getElementById('refresh-btn');
  if (!silent) refreshBtn.classList.add('spinning');
  try {
    const dateStr = fmtDate(dateOffset);
    const data = await apiGet({ action: 'list' });
    const newAllStops = data.stops || [];
    const newStops = newAllStops.filter(s => parseSheetDate(s.Date) === dateStr);

    const newAllHash = hashStops(newAllStops);
    const newStopsHash = hashStops(newStops);
    if (newAllHash === lastAllStopsHash && newStopsHash === lastStopsHash) {
      if (!silent) refreshBtn.classList.remove('spinning');
      return;
    }
    lastAllStopsHash = newAllHash;
    lastStopsHash = newStopsHash;

    allStops = newAllStops;
    stops = newStops;
    renderStops();
    document.getElementById('header-sub').textContent = stops.length + ' stop' + (stops.length === 1 ? '' : 's') + ' · ' + dateLabel(dateOffset).toLowerCase();
  } catch (err) {
    document.getElementById('header-sub').textContent = 'Connection issue — retrying';
  }
  if (!silent) refreshBtn.classList.remove('spinning');
}

function manualRefresh() {
  loadStops(false);
}

async function submitStop() {
  const name = document.getElementById('inp-name').value.trim();
  if (!name) { document.getElementById('inp-name').focus(); return; }
  const btn = document.getElementById('add-btn');
  btn.disabled = true;
  btn.textContent = 'Adding...';
  try {
    lastActionTime = Date.now();
    const selectedDate = document.getElementById('inp-date').value || fmtDate(0);
    await apiPost({
      action: 'add',
      name,
      date: selectedDate,
      address: document.getElementById('inp-addr').value.trim(),
      orderNumber: document.getElementById('inp-order').value.trim(),
      notes: document.getElementById('inp-notes').value.trim()
    });
    ['inp-name','inp-addr','inp-order','inp-notes'].forEach(id => document.getElementById(id).value = '');
    showToast('Stop added for ' + selectedDate);
    const today = fmtDate(0);
    const diff = Math.round((new Date(selectedDate + 'T12:00:00') - new Date(today + 'T12:00:00')) / (1000*60*60*24));
    dateOffset = diff;
    document.getElementById('date-label').textContent = dateLabel(dateOffset);
    await loadStops(true);
    switchTab('route');
  } catch (err) {
    showToast('Could not add stop — check connection');
  }
  btn.disabled = false;
  btn.textContent = 'Add stop';
}

async function updateField(id, fields) {
  lastActionTime = Date.now();
  const s = stops.find(x => x.ID === id) || allStops.find(x => x.ID === id);
  if (s) Object.assign(s, fields);
  renderStops();
  try { await apiPost({ action: 'update', id, fields }); }
  catch (err) { showToast('Sync issue — will retry'); }
}

function markDelivered(id) { updateField(id, { Status: 'delivered', Reason: '' }); }
function markFailed(id) { updateField(id, { Status: 'not-delivered' }); }
function setReason(id, val) { updateField(id, { Reason: val }); }
function markPaid(id, method) {
  pendingChangeId = null;
  if (method === 'check' || method === 'money order') {
    pendingPayId = id;
    pendingPayMethod = method;
    renderStops();
    setTimeout(() => { const inp = document.getElementById('paynum-' + id); if (inp) inp.focus(); }, 50);
    return;
  }
  updateField(id, { Payment: 'paid', PayMethod: method, ReceivedBy: '' });
}
function confirmPayNumber(id) {
  const inp = document.getElementById('paynum-' + id);
  const num = inp ? inp.value.trim() : '';
  const label = pendingPayMethod + (num ? ' #' + num : '');
  pendingPayId = null; pendingPayMethod = ''; pendingChangeId = null;
  updateField(id, { Payment: 'paid', PayMethod: label, ReceivedBy: '' });
}
function cancelPayNumber() { pendingPayId = null; pendingPayMethod = ''; pendingChangeId = null; renderStops(); }
function markUnpaid(id) { pendingChangeId = null; updateField(id, { Payment: 'unpaid', PayMethod: '' }); }
function undoPay(id) {
  pendingChangeId = null;
  updateField(id, { Payment: '', PayMethod: '', ReceivedBy: '', PayTime: '' });
}
function resetPayment(id) {
  pendingPayId = null; pendingPayMethod = ''; pendingChangeId = id;
  renderStops();
}

function showCopyModal() {
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
  const y = tomorrow.getFullYear(), m = String(tomorrow.getMonth()+1).padStart(2,'0'), d = String(tomorrow.getDate()).padStart(2,'0');
  document.getElementById('copy-target-date').value = `${y}-${m}-${d}`;
  document.getElementById('copy-modal').style.display = 'block';
}
function hideCopyModal() { document.getElementById('copy-modal').style.display = 'none'; }
async function executeCopyRoute() {
  const targetDate = document.getElementById('copy-target-date').value;
  if (!targetDate) { showToast('Pick a target date'); return; }
  const sourceStops = stops.filter(s => s.Name);
  if (sourceStops.length === 0) { showToast('No stops to copy'); return; }
  lastActionTime = Date.now();
  let copied = 0;
  // Use the bulk copy endpoint if available, fallback to individual adds
  try {
    const res = await apiPost({ action: 'copyRoute', date: targetDate, stops: sourceStops.map(s => ({ name: s.Name||'', address: s.Address||'', notes: s.Notes||'' })) });
    if (res.success && typeof res.copied === 'number') { copied = res.copied; }
  } catch (e) {
    // Fallback: individual adds
    for (const s of sourceStops) {
      try {
        await apiPost({ action: 'add', date: targetDate, name: s.Name||'', address: s.Address||'', orderNumber: '', notes: s.Notes||'' });
        copied++;
      } catch (err) { /* continue */ }
    }
  }
  hideCopyModal();
  showToast(copied + ' stop' + (copied !== 1 ? 's' : '') + ' copied to ' + targetDate);
  const today = fmtDate(0);
  const diff = Math.round((new Date(targetDate + 'T12:00:00') - new Date(today + 'T12:00:00')) / (1000*60*60*24));
  dateOffset = diff;
  document.getElementById('date-label').textContent = dateLabel(dateOffset);
  await loadStops(true);
}

async function deleteStop(id) {
  const s = stops.find(x => x.ID === id) || allStops.find(x => x.ID === id);
  const name = s ? s.Name : 'this stop';
  showConfirm('Delete stop?', `Remove "${name}" permanently? This cannot be undone.`, async () => {
    lastActionTime = Date.now();
    try {
      await apiPost({ action: 'delete', id });
      stops = stops.filter(x => x.ID !== id);
      allStops = allStops.filter(x => x.ID !== id);
      renderStops();
      showToast('Deleted');
    } catch (err) { showToast('Could not delete — check connection'); }
  });
}

function showConfirm(title, body, onConfirm) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-body').textContent = body;
  const modal = document.getElementById('confirm-modal');
  modal.classList.add('show');
  const yesBtn = document.getElementById('confirm-yes');
  const noBtn = document.getElementById('confirm-no');
  const handler = () => { modal.classList.remove('show'); onConfirm(); };
  yesBtn.onclick = handler;
  noBtn.onclick = () => modal.classList.remove('show');
}

function setReceivedByLive(id, val) {
  lastActionTime = Date.now();
  const s = stops.find(x => x.ID === id) || allStops.find(x => x.ID === id);
  if (s) s.ReceivedBy = val;
  clearTimeout(receivedByTimers[id]);
  receivedByTimers[id] = setTimeout(() => {
    apiPost({ action: 'update', id, fields: { ReceivedBy: val } }).catch(() => {});
  }, 1200); // longer debounce = fewer network calls
  renderReceivedHint(id, val);
}
function renderReceivedHint(id, val) {
  const hint = document.getElementById('hint-' + id);
  if (!hint) return;
  if (val && val.trim()) { hint.className = 'ok-text'; hint.innerHTML = 'Received by: ' + escapeHtml(val); }
  else { hint.className = 'warn-text'; hint.textContent = 'Required — enter who received the order'; }
}

function applyFilter(list) {
  if (currentFilter === 'all') return list;
  if (currentFilter === 'unpaid') return list.filter(s => s.Payment === 'unpaid');
  if (currentFilter === 'paid') return list.filter(s => s.Payment === 'paid');
  if (currentFilter === 'missing') return list.filter(s => isMissing(s));
  return list.filter(s => s.Status === currentFilter);
}

function renderStops() {
  if (renderRaf) cancelAnimationFrame(renderRaf);
  renderRaf = requestAnimationFrame(() => {
    renderRaf = null;
    _renderStopsImpl();
  });
}

function _renderStopsImpl() {
  const total = allStops.length;
  const delivered = allStops.filter(s => s.Status === 'delivered').length;
  const paid = allStops.filter(s => s.Payment === 'paid').length;
  const unpaid = allStops.filter(s => s.Payment === 'unpaid').length;
  const missing = allStops.filter(s => isMissing(s)).length;
  document.getElementById('m-total').textContent = total;
  document.getElementById('m-delivered').textContent = delivered;
  document.getElementById('m-paid').textContent = paid;
  document.getElementById('m-unpaid').textContent = unpaid;
  document.getElementById('m-missing').textContent = missing;

  // toggle highlight borders based on whether there are items
  document.getElementById('metric-unpaid').classList.toggle('highlight-red', unpaid > 0);
  document.getElementById('metric-missing').classList.toggle('highlight-blue', missing > 0);

  // global banner
  document.getElementById('global-banner').classList.toggle('show', globalMode);
  if (!globalMode) {
    document.querySelectorAll('.metric').forEach(m => m.classList.remove('active-metric'));
  }

  const copySection = document.getElementById('copy-route-section');
  if (copySection) copySection.style.display = stops.length > 0 ? 'block' : 'none';

  const baseList = globalMode ? allStops : stops;
  const container = document.getElementById('stops-container');
  const filtered = applyFilter(baseList);

  if (baseList.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9 12l2 2 4-4"></path></svg>
      <p>No stops for this day yet.<br>Add one from the "Add stop" tab.</p>
    </div>`;
    return;
  }
  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><p>No stops match this filter.</p></div>`;
    return;
  }

  container.innerHTML = filtered.map((s) => {
    const idx = baseList.indexOf(s) + 1;
    const stopMissing = isMissing(s);
    const badgeCls = s.Status === 'delivered' ? 'badge-delivered' : s.Status === 'not-delivered' ? 'badge-failed' : stopMissing ? 'badge-missing' : 'badge-pending';
    const badgeTxt = s.Status === 'delivered' ? 'Delivered' : s.Status === 'not-delivered' ? 'Not delivered' : stopMissing ? 'MISSING' : 'Pending';
    const cardClass = s.Status === 'delivered' ? 'delivered' : s.Status === 'not-delivered' ? 'not-delivered' : stopMissing ? 'missing' : 'pending';

    const metaBits = [];
    if (globalMode || currentFilter === 'missing' || currentFilter === 'unpaid') metaBits.push(parseSheetDate(s.Date));
    if (s.OrderNumber) metaBits.push(s.OrderNumber);
    if (s.Address) metaBits.push('Driver: ' + s.Address);
    metaBits.push('Added ' + parseSheetTime(s.AddedTime || ''));

    const notesHtml = s.Notes ? `<div class="stop-notes">${escapeHtml(s.Notes)}</div>` : '';
    let overdueHtml = '';
    if (stopMissing) {
      const stopDate = new Date(parseSheetDate(s.Date) + 'T12:00:00');
      const hoursDiff = Math.floor((new Date() - stopDate) / (1000 * 60 * 60));
      const days = Math.floor(hoursDiff / 24);
      overdueHtml = `<div style="font-size:12px;color:var(--purple);font-weight:600;margin-top:6px">⚠ Overdue by ${days} day${days !== 1 ? 's' : ''} — not fulfilled within 48 hours</div>`;
    }

    let reasonHtml = '';
    if (s.Status === 'not-delivered') {
      reasonHtml = `<select class="reason-select" data-action="reason" data-id="${s.ID}">
        <option value="">Select reason for non-delivery</option>
        ${REASONS.map(r => `<option value="${escapeHtml(r)}" ${s.Reason === r ? 'selected' : ''}>${escapeHtml(r)}</option>`).join('')}
      </select>
      ${s.Reason ? `<div class="ok-text">${escapeHtml(s.Reason)}</div>` : `<div class="warn-text">Reason needed</div>`}`;
    }

    let actionHtml = '';
    if (s.Status === 'pending') {
      actionHtml = `<div class="action-row">
        <button class="btn btn-sm btn-green" data-action="delivered" data-id="${s.ID}">Delivered</button>
        <button class="btn btn-sm btn-red" data-action="failed" data-id="${s.ID}">Not delivered</button>
        <button class="btn btn-sm btn-outline" data-action="delete" data-id="${s.ID}">Delete</button>
      </div>`;
    } else if (s.Status === 'not-delivered') {
      actionHtml = `<div class="action-row">
        <button class="btn-ghost" data-action="delivered" data-id="${s.ID}">Undo — mark delivered instead</button>
        <button class="btn-ghost" data-action="delete" data-id="${s.ID}">Delete</button>
      </div>`;
    } else if (s.Status === 'delivered') {
      actionHtml = `<div class="action-row">
        <button class="btn-ghost" data-action="delete" data-id="${s.ID}">Delete</button>
      </div>`;
    }

    let payHtml = '';
    if (s.Status === 'delivered') {
      if (pendingChangeId === s.ID) {
        payHtml = `<hr class="divider">
          <div class="pay-label">Change payment to</div>
          <div class="action-row-wrap">
            <button class="btn btn-sm btn-green" data-action="payCash" data-id="${s.ID}">Cash</button>
            <button class="btn btn-sm btn-green" data-action="payCheck" data-id="${s.ID}">Check</button>
            <button class="btn btn-sm btn-green" data-action="payMO" data-id="${s.ID}">Money order</button>
            <button class="btn btn-sm btn-red" data-action="payUnpaid" data-id="${s.ID}">Not paid</button>
            <button class="btn btn-sm btn-outline" data-action="cancelChange">Cancel</button>
          </div>`;
        if (s.Payment === 'unpaid') {
          payHtml += `<div class="pay-input-row">
            <input type="text" placeholder="Name of person who received order" value="${escapeAttr(s.ReceivedBy || '')}" oninput="setReceivedByLive('${s.ID}', this.value)">
            <div id="hint-${s.ID}" class="${s.ReceivedBy ? 'ok-text' : 'warn-text'}">${s.ReceivedBy ? 'Received by: ' + escapeHtml(s.ReceivedBy) : 'Required — enter who received the order'}</div>
          </div>`;
        }
      } else if (!s.Payment) {
        if (pendingPayId === s.ID) {
          payHtml = `<hr class="divider">
            <div class="pay-label">Enter ${escapeHtml(pendingPayMethod)} number</div>
            <div class="pay-input-row">
              <input type="text" id="paynum-${s.ID}" placeholder="${escapeHtml(pendingPayMethod)} number (optional)" onkeydown="if(event.key==='Enter')confirmPayNumber('${s.ID}')">
              <div class="action-row">
                <button class="btn btn-sm btn-green" data-action="confirmPay" data-id="${s.ID}">Save</button>
                <button class="btn btn-sm btn-outline" data-action="cancelPay">Cancel</button>
              </div>
            </div>`;
        } else {
          payHtml = `<hr class="divider">
            <div class="pay-label">Payment</div>
            <div class="action-row-wrap">
              <button class="btn btn-sm btn-green" data-action="payCash" data-id="${s.ID}">Cash</button>
              <button class="btn btn-sm btn-green" data-action="payCheck" data-id="${s.ID}">Check</button>
              <button class="btn btn-sm btn-green" data-action="payMO" data-id="${s.ID}">Money order</button>
              <button class="btn btn-sm btn-red" data-action="payUnpaid" data-id="${s.ID}">Not paid</button>
            </div>`;
        }
      } else if (s.Payment === 'paid') {
        payHtml = `<hr class="divider">
          <div class="pay-status-row">
            <span class="badge badge-delivered">Paid — ${escapeHtml(s.PayMethod || '')}${s.PayTime ? ' · ' + parseSheetTime(s.PayTime) : ''}</span>
            <div>
              <button class="btn-ghost" data-action="resetPay" data-id="${s.ID}">Change</button>
              <button class="btn-ghost" data-action="undoPay" data-id="${s.ID}">Undo</button>
            </div>
          </div>`;
      } else if (s.Payment === 'unpaid') {
        payHtml = `<hr class="divider">
          <div class="pay-status-row">
            <span class="badge badge-failed">Not paid${s.PayTime ? ' · ' + parseSheetTime(s.PayTime) : ''}</span>
            <div>
              <button class="btn-ghost" data-action="resetPay" data-id="${s.ID}">Change</button>
              <button class="btn-ghost" data-action="undoPay" data-id="${s.ID}">Undo</button>
            </div>
          </div>
          <div class="pay-input-row">
            <input type="text" placeholder="Name of person who received order" value="${escapeAttr(s.ReceivedBy || '')}" oninput="setReceivedByLive('${s.ID}', this.value)">
            <div id="hint-${s.ID}" class="${s.ReceivedBy ? 'ok-text' : 'warn-text'}">${s.ReceivedBy ? 'Received by: ' + escapeHtml(s.ReceivedBy) : 'Required — enter who received the order'}</div>
          </div>`;
      }
    }

    return `<div class="stop-card ${cardClass}">
      <div class="stop-top">
        <div>
          <div class="stop-num">#${idx}</div>
          <div class="stop-name">${escapeHtml(s.Name)}</div>
          <div class="stop-meta">${metaBits.map(escapeHtml).join(' · ')}</div>
        </div>
        <span class="badge ${badgeCls}">${badgeTxt}</span>
      </div>
      ${notesHtml}
      ${overdueHtml}
      ${actionHtml}
      ${reasonHtml}
      ${payHtml}
    </div>`;
  }).join('');
}

function parseSheetTime(val) {
  if (!val) return '';
  const str = String(val);
  if (/^\d{1,2}:\d{2}\s?(AM|PM)$/i.test(str)) return str;
  const d = new Date(str);
  if (!isNaN(d.getTime())) {
    let h = d.getHours();
    const m = String(d.getMinutes()).padStart(2, '0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return `${h}:${m} ${ampm}`;
  }
  return str;
}

function escapeHtml(str) {
  if (str === undefined || str === null) return '';
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(str) {
  return escapeHtml(str).replace(/`/g, '&#96;');
}

// --- Event delegation for stop cards (fixes mobile ghost-click / refresh-mid-click bugs) ---
document.getElementById('stops-container').addEventListener('click', (e) => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;
  if (action === 'delivered') markDelivered(id);
  else if (action === 'failed') markFailed(id);
  else if (action === 'delete') deleteStop(id);
  else if (action === 'payCash') markPaid(id, 'cash');
  else if (action === 'payCheck') markPaid(id, 'check');
  else if (action === 'payMO') markPaid(id, 'money order');
  else if (action === 'payUnpaid') markUnpaid(id);
  else if (action === 'confirmPay') confirmPayNumber(id);
  else if (action === 'cancelPay') cancelPayNumber();
  else if (action === 'cancelChange') { pendingChangeId = null; renderStops(); }
  else if (action === 'undoPay') undoPay(id);
  else if (action === 'resetPay') resetPayment(id);
});

// Reason select change is not a click — attach separately via delegation
document.getElementById('stops-container').addEventListener('change', (e) => {
  if (e.target.classList.contains('reason-select')) {
    setReason(e.target.dataset.id, e.target.value);
  }
});

// Filter chip click delegation
document.querySelector('.filter-row').addEventListener('click', (e) => {
  const chip = e.target.closest('.filter-chip');
  if (chip) setFilter(chip.dataset.filter);
});

// Pause auto-refresh during any touch / pointer interaction
document.body.addEventListener('pointerdown', () => {
  isInteracting = true;
  clearTimeout(interactionTimer);
  interactionTimer = setTimeout(() => { isInteracting = false; }, 500);
}, { passive: true });

// Send weekly report manually
async function sendWeeklyReport() {
  const btn = document.getElementById('report-btn');
  btn.style.opacity = '0.5';
  showToast('Sending report...');
  try {
    await apiPost({ action: 'sendReport' });
    showToast('Weekly report sent!');
  } catch (err) {
    showToast('Could not send report');
  }
  btn.style.opacity = '1';
}

// Init
document.getElementById('date-label').textContent = dateLabel(0);
document.getElementById('inp-date').value = fmtDate(0);
loadStops();
pollTimer = setInterval(() => loadStops(true), 60000); // was 15000

// Pause polling when tab is hidden, resume when visible
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    clearInterval(pollTimer);
    pollTimer = null;
  } else if (!pollTimer) {
    pollTimer = setInterval(() => loadStops(true), 60000);
    loadStops(true); // catch up immediately
  }
});
</script>
